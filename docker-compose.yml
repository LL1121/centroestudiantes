services:
  db:
    image: pgvector/pgvector:pg16
    container_name: centro-postgres
    hostname: centro-postgres
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/usr/local/bin/docker-entrypoint-wrapper.sh"]
    command: ["postgres"]
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definí POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-centro}
    volumes:
      - centro_pgdata:/var/lib/postgresql/data
      - ./docker/db/docker-entrypoint-wrapper.sh:/usr/local/bin/docker-entrypoint-wrapper.sh:ro
      - ./docker/db/sync-password.sh:/usr/local/bin/sync-password.sh:ro
    networks:
      lyntrix_network:
        # Alias único para evitar colisiones con otros stacks que tengan un servicio "db"
        aliases:
          - centro-postgres
          - centro-db
    healthcheck:
      # Espera a que el sync de contraseña haya aplicado (auth TCP con .env)
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -q && PGPASSWORD=\"$$POSTGRES_PASSWORD\" psql -h 127.0.0.1 -U \"$$POSTGRES_USER\" -d postgres -c 'SELECT 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  clamav:
    image: clamav/clamav:1.4
    container_name: centro-clamav
    restart: unless-stopped
    networks:
      lyntrix_network:
        aliases:
          - centro-clamav

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: centro-biblioteca-api:latest
    container_name: centro-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"

      # La URL se arma en app/core/config.py desde estas variables (password escapado).
      # Usamos el container_name (único globalmente en la red) para evitar colisiones
      # con otros stacks que también declaren un servicio "db" en lyntrix_network.
      POSTGRES_HOST: centro-postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definí POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-centro}

      JWT_SECRET: ${JWT_SECRET:?Definí JWT_SECRET en .env}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "14"

      CORS_ORIGINS: ${CORS_ORIGINS:-https://biblioteca.ies9018malargue.edu.ar}

      STORAGE_BACKEND: local
      STORAGE_ROOT: /app/var/storage

      EMBEDDING_DIM: "1536"
      # fake | openai | gemini (gemini = free tier, reusa GEMINI_API_KEY)
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-gemini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      OCR_LANGS: ${OCR_LANGS:-spa+eng}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-50}
      OCR_MIN_NATIVE_CHARS: ${OCR_MIN_NATIVE_CHARS:-200}
      OCR_DPI: ${OCR_DPI:-200}
      FUZZY_THRESHOLD: ${FUZZY_THRESHOLD:-0.2}

      LLM_BACKEND: ${LLM_BACKEND:-gemini}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash-latest}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-8192}
      LLM_TOP_K: ${LLM_TOP_K:-5}
      CHAT_RATE_LIMIT: ${CHAT_RATE_LIMIT:-30/day}
      CHAT_RELEVANCE_ENABLED: ${CHAT_RELEVANCE_ENABLED:-false}
      CHAT_RELEVANCE_MAX_DISTANCE: ${CHAT_RELEVANCE_MAX_DISTANCE:-0.75}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      REQUIRE_EMAIL_VERIFIED: ${REQUIRE_EMAIL_VERIFIED:-false}
      ANTIVIRUS_ENABLED: ${ANTIVIRUS_ENABLED:-false}
      CLAMAV_HOST: centro-clamav
      CLAMAV_PORT: "3310"
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-52428800}
    volumes:
      - centro_storage:/app/var/storage
    networks:
      lyntrix_network:
        aliases:
          - centro-backend

  biblioteca-frontend:
    build:
      # El contexto es la raíz del monorepo: el Dockerfile necesita acceder a packages/
      context: .
      dockerfile: apps/biblioteca/Dockerfile
      args:
        NEXT_PUBLIC_BIBLIOTECA_ONLY: "true"
    image: centro-biblioteca-web:latest
    container_name: centro-biblioteca-frontend
    hostname: centro-biblioteca-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      BACKEND_URL: http://centro-backend:8000
      COPYRIGHT_ENABLED: ${COPYRIGHT_ENABLED:-true}
    ports:
      - "3005:3000"
    networks:
      lyntrix_network:
        aliases:
          - centro-biblioteca-frontend

  centro-frontend:
    build:
      # El contexto es la raíz del monorepo: el Dockerfile necesita acceder a packages/
      context: .
      dockerfile: apps/centro/Dockerfile
    image: centro-landing-web:latest
    container_name: centro-frontend
    hostname: centro-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # URL de la biblioteca — ajustar según topología de dominio:
      #   Subdominios:   NEXT_PUBLIC_BIBLIOTECA_URL=https://biblioteca.ies9018malargue.edu.ar
      #   Mismo dominio: NEXT_PUBLIC_BIBLIOTECA_URL=/biblioteca
      NEXT_PUBLIC_BIBLIOTECA_URL: ${NEXT_PUBLIC_BIBLIOTECA_URL:-https://biblioteca.ies9018malargue.edu.ar}
    ports:
      - "3007:3000"
    networks:
      lyntrix_network:
        aliases:
          - centro-frontend

  calendario-frontend:
    build:
      context: .
      dockerfile: apps/calendario/Dockerfile
    image: centro-calendario-web:latest
    container_name: centro-calendario
    hostname: centro-calendario
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "3008:3000"
    networks:
      lyntrix_network:
        aliases:
          - centro-calendario

networks:
  lyntrix_network:
    external: true

volumes:
  centro_pgdata:
  centro_storage:
