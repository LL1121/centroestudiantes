services:
  db:
    image: pgvector/pgvector:pg16
    container_name: centro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: centro
    ports:
      - "5432:5432"
    volumes:
      - centro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  centro_pgdata:
