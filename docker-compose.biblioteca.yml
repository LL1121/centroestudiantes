# ============================================================================
# Stack AISLADO de la Biblioteca Digital (db + backend + frontend).
#
# Pensado para correr en un servidor propio, SIN compartir red con otros
# stacks (no usa `lyntrix_network`). Compose crea su red default y los
# servicios se resuelven entre sí por su `container_name`.
#
# Levantar:
#   docker compose -f docker-compose.biblioteca.yml up -d --build
#
# Si tenés un Cloudflare Tunnel / reverse proxy en este servidor, apuntalo
# al puerto publicado 3005 del host (o sumá el contenedor cloudflared a este
# mismo compose).
# ============================================================================
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: biblioteca-postgres
    hostname: biblioteca-postgres
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/usr/local/bin/docker-entrypoint-wrapper.sh"]
    command: ["postgres"]
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definí POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-centro}
    volumes:
      - biblioteca_pgdata:/var/lib/postgresql/data
      - ./docker/db/docker-entrypoint-wrapper.sh:/usr/local/bin/docker-entrypoint-wrapper.sh:ro
      - ./docker/db/sync-password.sh:/usr/local/bin/sync-password.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -q && PGPASSWORD=\"$$POSTGRES_PASSWORD\" psql -h 127.0.0.1 -U \"$$POSTGRES_USER\" -d postgres -c 'SELECT 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  clamav:
    image: clamav/clamav:1.4
    container_name: biblioteca-clamav
    hostname: biblioteca-clamav
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: biblioteca-api:latest
    container_name: biblioteca-backend
    hostname: biblioteca-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"

      # La URL se arma en app/core/config.py desde estas variables.
      POSTGRES_HOST: biblioteca-postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definí POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-centro}

      JWT_SECRET: ${JWT_SECRET:?Definí JWT_SECRET en .env}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "14"

      CORS_ORIGINS: ${CORS_ORIGINS:-https://biblioteca.ies9018malargue.edu.ar}

      STORAGE_BACKEND: local
      STORAGE_ROOT: /app/var/storage

      EMBEDDING_DIM: "1536"
      # fake | openai | gemini (gemini = free tier, reusa GEMINI_API_KEY)
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-gemini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      OCR_LANGS: ${OCR_LANGS:-spa+eng}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-50}
      OCR_MIN_NATIVE_CHARS: ${OCR_MIN_NATIVE_CHARS:-200}
      OCR_DPI: ${OCR_DPI:-200}
      FUZZY_THRESHOLD: ${FUZZY_THRESHOLD:-0.2}

      LLM_BACKEND: ${LLM_BACKEND:-gemini}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash-latest}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1200}
      LLM_TOP_K: ${LLM_TOP_K:-5}
      CHAT_RATE_LIMIT: ${CHAT_RATE_LIMIT:-30/day}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      MODERATION_ENABLED: ${MODERATION_ENABLED:-true}
      MODERATION_MAX_PAGES: ${MODERATION_MAX_PAGES:-20}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://biblioteca.ies9018malargue.edu.ar}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      REQUIRE_EMAIL_VERIFIED: ${REQUIRE_EMAIL_VERIFIED:-false}
      ANTIVIRUS_ENABLED: ${ANTIVIRUS_ENABLED:-false}
      CLAMAV_HOST: biblioteca-clamav
      CLAMAV_PORT: "3310"
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-52428800}
    volumes:
      - biblioteca_storage:/app/var/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BIBLIOTECA_ONLY: "true"
    image: biblioteca-web:latest
    container_name: biblioteca-frontend
    hostname: biblioteca-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      BACKEND_URL: http://biblioteca-backend:8000
    ports:
      - "3005:3000"

volumes:
  biblioteca_pgdata:
  biblioteca_storage:
