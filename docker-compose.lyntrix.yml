# ============================================================================
# Deploy de la Biblioteca Digital en biblioteca.lyntrix.com.ar
#
# Combina lo mejor de los otros dos composes:
#   - Modo "solo biblioteca" (NEXT_PUBLIC_BIBLIOTECA_ONLY=true): la app vive en
#     la RAÍZ del subdominio. Entrás a https://biblioteca.lyntrix.com.ar y caés
#     directo en la biblioteca (sin pasar por la landing del centro).
#   - Red externa `lyntrix_network`: tu Cloudflare Tunnel (cloudflared) alcanza
#     al frontend por su container_name, igual que el resto de tus stacks.
#
# Levantar:
#   docker compose -f docker-compose.lyntrix.yml up -d --build
#
# Cloudflare Tunnel (ingress de cloudflared, mismo network):
#   - hostname: biblioteca.lyntrix.com.ar
#     service: http://biblioteca-frontend:3000
#   - service: http_status:404
# ============================================================================
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: biblioteca-postgres
    hostname: biblioteca-postgres
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/usr/local/bin/docker-entrypoint-wrapper.sh"]
    command: ["postgres"]
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definí POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-centro}
    volumes:
      - biblioteca_pgdata:/var/lib/postgresql/data
      - ./docker/db/docker-entrypoint-wrapper.sh:/usr/local/bin/docker-entrypoint-wrapper.sh:ro
      - ./docker/db/sync-password.sh:/usr/local/bin/sync-password.sh:ro
    networks:
      lyntrix_network:
        aliases:
          - biblioteca-postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -q && PGPASSWORD=\"$$POSTGRES_PASSWORD\" psql -h 127.0.0.1 -U \"$$POSTGRES_USER\" -d postgres -c 'SELECT 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  clamav:
    image: clamav/clamav:1.4
    container_name: biblioteca-clamav
    hostname: biblioteca-clamav
    restart: unless-stopped
    networks:
      lyntrix_network:
        aliases:
          - biblioteca-clamav

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: biblioteca-api:latest
    container_name: biblioteca-backend
    hostname: biblioteca-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"

      POSTGRES_HOST: biblioteca-postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definí POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-centro}

      JWT_SECRET: ${JWT_SECRET:?Definí JWT_SECRET en .env}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "14"

      CORS_ORIGINS: ${CORS_ORIGINS:-https://biblioteca.lyntrix.com.ar}

      STORAGE_BACKEND: local
      STORAGE_ROOT: /app/var/storage

      EMBEDDING_DIM: "1536"
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-gemini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      OCR_LANGS: ${OCR_LANGS:-spa+eng}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-50}
      OCR_MIN_NATIVE_CHARS: ${OCR_MIN_NATIVE_CHARS:-200}
      OCR_DPI: ${OCR_DPI:-200}
      FUZZY_THRESHOLD: ${FUZZY_THRESHOLD:-0.2}

      LLM_BACKEND: ${LLM_BACKEND:-gemini}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash-latest}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-8192}
      LLM_TOP_K: ${LLM_TOP_K:-5}
      CHAT_RATE_LIMIT: ${CHAT_RATE_LIMIT:-30/day}
      CHAT_RELEVANCE_ENABLED: ${CHAT_RELEVANCE_ENABLED:-false}
      CHAT_RELEVANCE_MAX_DISTANCE: ${CHAT_RELEVANCE_MAX_DISTANCE:-0.75}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      MODERATION_ENABLED: ${MODERATION_ENABLED:-true}
      MODERATION_MAX_PAGES: ${MODERATION_MAX_PAGES:-20}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://biblioteca.lyntrix.com.ar}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      REQUIRE_EMAIL_VERIFIED: ${REQUIRE_EMAIL_VERIFIED:-false}
      ANTIVIRUS_ENABLED: ${ANTIVIRUS_ENABLED:-false}
      CLAMAV_HOST: biblioteca-clamav
      CLAMAV_PORT: "3310"
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-52428800}
      COPYRIGHT_ENFORCEMENT_ENABLED: ${COPYRIGHT_ENFORCEMENT_ENABLED:-false}
    volumes:
      - biblioteca_storage:/app/var/storage
    networks:
      lyntrix_network:
        aliases:
          - biblioteca-backend

  frontend:
    build:
      # El contexto es la raíz del monorepo: el Dockerfile necesita acceder a packages/
      context: .
      dockerfile: apps/biblioteca/Dockerfile
      args:
        # Clave: la biblioteca vive en la RAÍZ del subdominio.
        NEXT_PUBLIC_BIBLIOTECA_ONLY: "true"
        NEXT_PUBLIC_COPYRIGHT_ENABLED: "false"
    image: biblioteca-web:latest
    container_name: biblioteca-frontend
    hostname: biblioteca-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      BACKEND_URL: http://biblioteca-backend:8000
      COPYRIGHT_ENABLED: ${COPYRIGHT_ENABLED:-false}
    # Puerto al host opcional: útil para comprobar local con curl.
    # Cloudflare Tunnel NO lo necesita (alcanza por la red interna).
    ports:
      - "3006:3000"
    networks:
      lyntrix_network:
        aliases:
          - biblioteca-frontend

  calendario-frontend:
    build:
      # El contexto es la raíz del monorepo: el Dockerfile necesita acceder a packages/
      context: .
      dockerfile: apps/calendario/Dockerfile
    image: centro-calendario-web:latest
    container_name: centro-calendario
    hostname: centro-calendario
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    # Cloudflare Tunnel: calendario.lyntrix.com.ar → http://centro-calendario:3000
    ports:
      - "3007:3000"
    networks:
      lyntrix_network:
        aliases:
          - centro-calendario

networks:
  lyntrix_network:
    external: true

volumes:
  biblioteca_pgdata:
  biblioteca_storage:
